<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="color-scheme" content="light dark">
  <title>BeHappy Кошелёк</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --text: #1a1d21;
      --text-muted: #707579;
      --brand: #3390ec;
      --border: #dadce0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f0f;
        --surface: #212121;
        --text: #ffffff;
        --text-muted: #aaaaaa;
        --border: #303030;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 28rem;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      background: var(--brand);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 2rem;
      font-weight: 600;
      box-shadow: 0 12px 32px rgba(51, 144, 236, 0.25);
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
      font-weight: 600;
    }
    p {
      margin: 0 0 1.5rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">₿</div>
    <h1>BeHappy Кошелёк</h1>
    <p>Скоро здесь будет ваш кошелёк со звёздами, переводами и историей операций.</p>
    <span class="badge">Coming soon</span>
  </div>
</body>
</html>
